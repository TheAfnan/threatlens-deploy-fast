<svg width="100%" height="100%" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="10" y1="5" x2="90" y2="95" gradientUnits="userSpaceOnUse">
      <stop stopColor="#0a152d" />
      <stop offset="1" stopColor="#0c4a6e" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="50" y1="50" x2="90" y2="10" gradientUnits="userSpaceOnUse">
      <stop stopColor="#22d3ee" />
      <stop offset="1" stopColor="#38bdf8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Shield Background -->
  <path d="M50 5 L90 20 V45 C90 75 50 95 50 95 C50 95 10 75 10 45 V20 L50 5Z" fill="url(#shieldGrad)" stroke="#0284c7" strokeWidth="2.5" strokeLinejoin="round"/>
  
  <!-- Inner Shield Bevel (3D effect) -->
  <path d="M50 12 L82 24 V45 C82 68 50 85 50 85 C50 85 18 68 18 45 V24 L50 12Z" fill="none" stroke="#38bdf8" strokeWidth="1" opacity="0.3"/>
  
  <!-- Outer Target Circle -->
  <circle cx="45" cy="55" r="22" stroke="#22d3ee" strokeWidth="1.5" fill="none" opacity="0.7"/>
  
  <!-- Inner Target Circle with Dashes -->
  <circle cx="45" cy="55" r="14" stroke="#22d3ee" strokeWidth="1.5" fill="none" strokeDasharray="4 4" opacity="0.9"/>
  
  <!-- Center Dot -->
  <circle cx="45" cy="55" r="3" fill="#22d3ee" filter="url(#glow)"/>
  
  <!-- Crosshair Lines -->
  <line x1="15" y1="55" x2="75" y2="55" stroke="#22d3ee" strokeWidth="1" opacity="0.4"/>
  <line x1="45" y1="25" x2="45" y2="85" stroke="#22d3ee" strokeWidth="1" opacity="0.4"/>
  
  <!-- Arrow Bursting Out Top Right -->
  <path d="M45 55 L88 12 M73 12 L88 12 L88 27" stroke="url(#arrowGrad)" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" filter="url(#glow)"/>
</svg>
